apiVersion: apps/v1
kind: Deployment
metadata:
name: html-demo
spec:
replicas: 2
selector:
matchLabels:
app: html-demo
template:
metadata:
labels:
app: html-demo
spec:
containers:
- name: html-demo
image: da1agile/html-demo:latest
ports:
- containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
name: da1agile-service
spec:
type: NodePort
selector:
app: da1agile
ports:
- port: 80
targetPort: 80
nodePort: 30010
