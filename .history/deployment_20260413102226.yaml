apiVersion: apps/v1
kind: Deployment
metadata:
name: html-demo
spec:
replicas: 2
selector:
matchLabels:
app: da1agile
template:
metadata:
labels:
app: da1agile
spec:
containers:
- name: da1agile
image: kirti75/da1agile:latest
ports:
- containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
name: da1agile-service
spec:
type: NodePort
selector:
app: da1agile
ports:
- port: 80
targetPort: 80
nodePort: 30010
